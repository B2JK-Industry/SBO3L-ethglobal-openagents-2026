# SBO3L cross-framework demo — single agent crossing 3 LLM frameworks.
#
# Topology:
#
#     orchestrator  ──▶  plan (LangChain)  ──▶  SBO3L
#                   ──▶  execute (CrewAI)  ──▶  SBO3L
#                   ──▶  confirm (AutoGen) ──▶  SBO3L
#
# All three services use the SAME SBO3L daemon → single hash-chained audit
# spans every framework boundary. Run:
#
#     docker compose up --build
#     docker compose run --rm orchestrator
#
# First-time `up --build` pulls + builds (~3-5 min). Subsequent `up` boots
# in <60s on a warm machine.

services:
  sbo3l-server:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: sbo3l-server:demo
    command: ["sbo3l-server"]
    environment:
      SBO3L_ALLOW_UNAUTHENTICATED: "1"
      # Server reads SBO3L_LISTEN (not SBO3L_BIND); 0.0.0.0 binds to
      # all interfaces — required so other containers in the compose
      # network can reach this one. SBO3L_ALLOW_UNSAFE_PUBLIC_BIND
      # acknowledges the non-loopback bind (the F-4 safety gate).
      SBO3L_LISTEN: "0.0.0.0:8730"
      SBO3L_ALLOW_UNSAFE_PUBLIC_BIND: "1"
      # F-5 signer-factory gate: production-mode lockout in
      # crates/sbo3l-core/src/eth_signer/factory.rs requires both env
      # vars to be set explicitly. Demo containers use public dev seeds.
      SBO3L_SIGNER_BACKEND: "dev"
      SBO3L_DEV_ONLY_SIGNER: "1"
    ports:
      - "8730:8730"
    # CMD form (not CMD-SHELL) — distroless base has no shell or wget,
    # which is why CI Multi-framework smoke kept failing on the previous
    # `wget -qO- ... | grep` healthcheck. Fixed 2026-05-03: shell out to
    # the `sbo3l` binary already in the image and let doctor probe the
    # SQLite the daemon writes on startup. doctor exits 0 once migrations
    # have been applied (~50ms locally) — strict superset of "daemon
    # initialised", because the HTTP listener binds on the same thread
    # before migrations finish.
    healthcheck:
      test: ["CMD", "/usr/local/bin/sbo3l", "doctor", "--db", "/var/lib/sbo3l/sbo3l.db"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s

  plan:
    build:
      context: ../..
      dockerfile: examples/multi-framework-agent/services/plan/Dockerfile
    image: sbo3l-multi-plan:demo
    environment:
      SBO3L_ENDPOINT: "http://sbo3l-server:8730"
    ports:
      - "8001:8001"
    depends_on:
      sbo3l-server:
        condition: service_healthy

  execute:
    build:
      context: ../..
      dockerfile: examples/multi-framework-agent/services/execute/Dockerfile
    image: sbo3l-multi-execute:demo
    environment:
      SBO3L_ENDPOINT: "http://sbo3l-server:8730"
    ports:
      - "8002:8002"
    depends_on:
      sbo3l-server:
        condition: service_healthy

  confirm:
    build:
      context: ../..
      dockerfile: examples/multi-framework-agent/services/confirm/Dockerfile
    image: sbo3l-multi-confirm:demo
    environment:
      SBO3L_ENDPOINT: "http://sbo3l-server:8730"
    ports:
      - "8003:8003"
    depends_on:
      sbo3l-server:
        condition: service_healthy

  orchestrator:
    build:
      context: ../..
      dockerfile: examples/multi-framework-agent/orchestrator/Dockerfile
    image: sbo3l-multi-orchestrator:demo
    environment:
      PLAN_URL: "http://plan:8001"
      EXECUTE_URL: "http://execute:8002"
      CONFIRM_URL: "http://confirm:8003"
      SBO3L_ENDPOINT: "http://sbo3l-server:8730"
    profiles: ["run"]   # not started by default; invoke via `compose run`
    depends_on:
      plan:
        condition: service_started
      execute:
        condition: service_started
      confirm:
        condition: service_started
