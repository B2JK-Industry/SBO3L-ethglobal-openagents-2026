[build-system]
requires = ["hatchling>=1.21"]
build-backend = "hatchling.build"

[project]
name = "sbo3l-example-uniswap-agent-py"
version = "1.0.0"
description = "Uniswap demo agent (Python) — submits APRP to SBO3L, on allow constructs SwapRouter02 calldata for Sepolia and (live mode) broadcasts. Returns tx hash + Etherscan URL."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = [
    "sbo3l-sdk>=1.0.0,<2",
]

[project.optional-dependencies]
web3 = ["sbo3l-sdk[web3]>=1.0.0,<2"]
dev = [
    "pytest>=8.0,<9",
    "pytest-httpx>=0.30,<1",
]

[tool.hatch.build.targets.wheel]
packages = ["sbo3l_uniswap_demo"]

[tool.pytest.ini_options]
testpaths = ["."]
filterwarnings = ["error"]
