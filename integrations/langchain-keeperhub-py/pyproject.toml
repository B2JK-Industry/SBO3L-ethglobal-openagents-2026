[build-system]
requires = ["hatchling>=1.21"]
build-backend = "hatchling.build"

[project]
name = "sbo3l-langchain-keeperhub"
version = "1.2.0"
description = "LangChain Python tool that gates KeeperHub workflow execution through SBO3L's policy boundary. Composable with sbo3l-sdk."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Daniel Babjak", email = "babjak_daniel@hotmail.com" }]
keywords = ["sbo3l", "langchain", "keeperhub", "agent", "policy", "tool", "ai-agent", "workflow"]
classifiers = [
    "Development Status :: 4 - Beta",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Security :: Cryptography",
    "Typing :: Typed",
]
dependencies = [
    "pydantic>=2.6,<3",
]

[project.optional-dependencies]
sdk = ["sbo3l-sdk>=1.0.0,<2"]
langchain = ["langchain-core>=0.2,<1"]
dev = [
    "pytest>=8.0,<9",
    "pytest-httpx>=0.30,<1",
    "ruff>=0.4,<1",
    "mypy>=1.10,<2",
    "pydantic>=2.6,<3",
]

[project.urls]
Homepage = "https://sbo3l.dev"
Repository = "https://github.com/B2JK-Industry/SBO3L-ethglobal-openagents-2026"

[tool.hatch.build.targets.wheel]
packages = ["sbo3l_langchain_keeperhub"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "N", "RUF"]

[tool.mypy]
strict = true
python_version = "3.10"
files = ["sbo3l_langchain_keeperhub"]

# langchain-core ships no PEP 561 type stubs (issue
# langchain-ai/langchain#9131). mypy --strict can't resolve
# `from langchain_core.tools import BaseTool` without them and reports
# both [import-not-found] on the import and [misc] "Class cannot
# subclass BaseTool (has type Any)". Mark the namespace as untyped so
# strict mode tolerates the upstream gap.
[[tool.mypy.overrides]]
module = ["langchain_core.*", "langchain.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
filterwarnings = ["error"]
