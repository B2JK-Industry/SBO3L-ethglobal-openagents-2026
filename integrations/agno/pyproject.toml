[build-system]
requires = ["hatchling>=1.21"]
build-backend = "hatchling.build"

[project]
name = "sbo3l-agno"
version = "1.2.0"
description = "Agno (formerly Phidata) adapter for SBO3L — wrap an APRP submit as an Agno Toolkit function."
license = { text = "MIT" }
authors = [{ name = "Daniel Babjak", email = "babjak_daniel@hotmail.com" }]
readme = "README.md"
requires-python = ">=3.10"
keywords = ["sbo3l", "agno", "phidata", "agent", "policy", "tool"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries",
]

dependencies = [
    "sbo3l-sdk>=1.0.0",
]

[project.optional-dependencies]
agno = ["agno>=1.0,<2.0"]
dev = [
    "pytest>=7",
    "pytest-httpx>=0.30",
    "ruff>=0.5",
    "mypy>=1.8",
]

[project.urls]
Homepage = "https://sbo3l.dev"
Repository = "https://github.com/B2JK-Industry/SBO3L-ethglobal-openagents-2026"
"Bug Tracker" = "https://github.com/B2JK-Industry/SBO3L-ethglobal-openagents-2026/issues"

[tool.hatch.build.targets.wheel]
packages = ["sbo3l_agno"]

[tool.hatch.build.targets.sdist]
include = [
    "sbo3l_agno",
    "tests",
    "README.md",
    "pyproject.toml",
]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "RUF", "UP", "SIM"]

[tool.mypy]
strict = true
python_version = "3.10"
