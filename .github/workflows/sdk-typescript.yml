name: SDK TypeScript

on:
  push:
    branches: ["**"]
    tags: ["sdk-ts-v*"]
    paths:
      - "sdks/typescript/**"
      - ".github/workflows/sdk-typescript.yml"
  pull_request:
    paths:
      - "sdks/typescript/**"
      - ".github/workflows/sdk-typescript.yml"

permissions:
  contents: read
  id-token: write

jobs:
  build-test:
    name: build + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/typescript

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: sdks/typescript/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Bundle size gate (< 50 KB gzipped)
        run: |
          SIZE=$(gzip -c dist/index.js | wc -c)
          echo "gzipped index.js = $SIZE bytes"
          if [ "$SIZE" -ge 50000 ]; then
            echo "::error::SDK bundle too large: $SIZE >= 50000"
            exit 1
          fi

  publish:
    name: publish to npm
    runs-on: ubuntu-latest
    needs: build-test
    if: startsWith(github.ref, 'refs/tags/sdk-ts-v')
    defaults:
      run:
        working-directory: sdks/typescript

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: sdks/typescript/package-lock.json

      - name: Install
        run: npm ci

      - name: Verify tag version matches package.json
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#sdk-ts-v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::tag $TAG_VERSION != package.json $PKG_VERSION"
            exit 1
          fi

      - name: Build
        run: npm run build

      - name: Publish (provenance)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public
