name: Capture /demo screenshots

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "Marketing base URL to screenshot (defaults to deployed)"
        type: string
        default: "https://sbo3l-marketing.vercel.app"
      open_pr:
        description: "Open auto-PR with the captured PNGs + .svg→.png swap"
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright + Chromium
        run: |
          npm install --no-save playwright@^1.48
          npx playwright install --with-deps chromium

      - name: Capture screenshots
        env:
          DEMO_BASE_URL: ${{ inputs.target_url }}
        run: node apps/marketing/scripts/capture-demo-screenshots.mjs

      - name: Verify all 8 PNGs landed
        run: |
          missing=0
          for n in 1 2 3 4; do
            for variant in "" "-mobile"; do
              f="apps/marketing/public/demo/step-${n}${variant}.png"
              if [ ! -s "$f" ]; then
                echo "::error::missing or empty: $f"
                missing=$((missing + 1))
              else
                printf "%-55s %s bytes\n" "$f" "$(wc -c < "$f")"
              fi
            done
          done
          test "$missing" = "0"

      - name: Sed swap .svg → .png in 3 demo pages
        if: inputs.open_pr == true
        run: |
          sed -i 's/\.svg/\.png/g' \
            apps/marketing/src/pages/demo/index.astro \
            apps/marketing/src/pages/demo/1-meet-the-agents.astro \
            apps/marketing/src/pages/demo/4-explore-the-trust-graph.astro

      - name: Remove now-unused .svg placeholders
        if: inputs.open_pr == true
        run: |
          rm -f apps/marketing/public/demo/step-*.svg
          # Keep the .placeholder-step.svg artist source — useful if a
          # future re-run regenerates with the script.

      - name: Configure git + create branch
        if: inputs.open_pr == true
        id: branch
        run: |
          git config user.name "sbo3l-bot"
          git config user.email "bot@sbo3l.dev"
          ts=$(date -u +%Y%m%d-%H%M%S)
          branch="bot/demo-screenshots-${ts}"
          git checkout -b "$branch"
          git add apps/marketing/public/demo/ apps/marketing/src/pages/demo/
          if git diff --cached --quiet; then
            echo "no changes — skipping commit"
            echo "made_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore(marketing): refresh /demo screenshots from ${{ inputs.target_url }}"
          git push --set-upstream origin "$branch"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          echo "made_changes=true" >> "$GITHUB_OUTPUT"

      - name: Open auto-PR (fall back to manual link on org-policy block)
        if: inputs.open_pr == true && steps.branch.outputs.made_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.SCREENSHOT_BOT_PAT || github.token }}
        run: |
          # Self-review fix: previously this step failed the whole run when
          # the org has "Allow GitHub Actions to create and approve PRs"
          # disabled. The branch + screenshots already pushed successfully
          # but the workflow status went red, hiding the fact that the
          # capture itself worked.
          #
          # New behavior: try gh pr create; if it returns the known org-
          # policy error, print a one-click compare URL in the job summary
          # so Daniel opens the PR manually. Branch + artifact still
          # available either way.
          set +e
          pr_output=$(gh pr create \
            --base main \
            --head "${{ steps.branch.outputs.branch }}" \
            --title "chore(marketing): refresh /demo screenshots" \
            --body "Auto-captured by \`.github/workflows/capture-demo-screenshots.yml\` against \`${{ inputs.target_url }}\`.

          - 8 PNGs in \`apps/marketing/public/demo/\` (step-{1,2,3,4}{,-mobile}.png)
          - \`.svg\` placeholder references swapped to \`.png\` in 3 demo pages
          - \`.svg\` placeholder files removed; \`.placeholder-step.svg\` (artist source) kept

          Triggered by @${{ github.actor }} via \`workflow_dispatch\`." 2>&1)
          create_rc=$?
          set -e

          if [ "$create_rc" -eq 0 ]; then
            echo "Opened PR: $pr_output"
            pr_number=$(gh pr list --head "${{ steps.branch.outputs.branch }}" --json number -q '.[0].number')
            gh pr merge "$pr_number" --auto --squash --delete-branch
            exit 0
          fi

          if echo "$pr_output" | grep -q "GitHub Actions is not permitted to create or approve pull requests"; then
            branch="${{ steps.branch.outputs.branch }}"
            manual_url="https://github.com/${{ github.repository }}/compare/main...${branch}?quick_pull=1&title=chore(marketing)%3A+refresh+%2Fdemo+screenshots"
            {
              echo "## Auto-PR blocked by org policy"
              echo
              echo "Branch \`$branch\` pushed with captured screenshots, but the org has"
              echo "\"Allow GitHub Actions to create and approve pull requests\" disabled."
              echo
              echo "**One-click PR:** [${manual_url}](${manual_url})"
              echo
              echo "To unblock permanently:"
              echo "- Enable Settings → Actions → General → \"Allow GitHub Actions to create and approve pull requests\", OR"
              echo "- Add a fine-grained PAT with \`pull-requests: write\` as repo secret \`SCREENSHOT_BOT_PAT\`"
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::auto-PR blocked by org policy; branch pushed and screenshots uploaded as artifact. See run summary for one-click PR link."
            exit 0
          fi

          echo "::error::gh pr create failed: $pr_output"
          exit 1

      - name: Upload screenshots as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: demo-screenshots-${{ github.run_id }}
          path: apps/marketing/public/demo/step-*.png
          retention-days: 30
