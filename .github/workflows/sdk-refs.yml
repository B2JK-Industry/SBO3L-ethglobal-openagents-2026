name: SDK refs (typedoc + sphinx)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"  # daily 04:00 UTC
  repository_dispatch:
    types: [sdk-published]

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate TypeScript SDK refs
        run: bash apps/docs/scripts/gen-sdk-ts-refs.sh
        continue-on-error: true

      - name: Generate Python SDK refs
        run: bash apps/docs/scripts/gen-sdk-py-refs.sh
        continue-on-error: true

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet apps/docs/public/sdk-ref; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit + push regenerated refs
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "sbo3l-bot"
          git config user.email "bot@sbo3l.dev"
          git add apps/docs/public/sdk-ref
          git commit -m "chore(docs): regenerate SDK refs from latest published packages

          Auto-generated by .github/workflows/sdk-refs.yml.
          Sources: npm @sbo3l/* + PyPI sbo3l-*."
          git push
