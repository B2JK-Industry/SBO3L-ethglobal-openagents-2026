name: Publish 9 SBO3L crates to crates.io

# Triggered by tagging the workspace with a version tag (`v0.1.0`,
# `v0.2.0`, ...). The 9 crates are published in dependency order:
#
#   1. sbo3l-core              (no internal deps)
#   2. sbo3l-storage           (deps: sbo3l-core)
#   3. sbo3l-policy            (deps: sbo3l-core, sbo3l-storage)
#   4. sbo3l-identity          (deps: sbo3l-core)
#   5. sbo3l-keeperhub-adapter (deps: sbo3l-core)
#   6. sbo3l-execution         (deps: sbo3l-core, sbo3l-keeperhub-adapter)
#   7. sbo3l-server            (deps: sbo3l-core, sbo3l-policy, sbo3l-storage)
#   8. sbo3l-mcp               (deps: 1-7)
#   9. sbo3l-cli               (deps: 1-7)
#
# Each step waits ~30s for the crates.io index to propagate before
# publishing the next dependent crate — necessary because subsequent
# `cargo publish` runs need to resolve the just-published crate from
# the registry, not from the workspace path.
#
# # Supply-chain attestation (R21 Task A, 2026-05-03)
#
# Every published `.crate` file gets a SLSA Build Provenance v1
# attestation via `actions/attest-build-provenance@v2`. The
# attestation is:
#   - signed by the workflow's GitHub OIDC token (Sigstore Fulcio)
#   - recorded on the public Rekor transparency log
#   - downloadable per-crate from the workflow run's "Attestations"
#     surface or via `gh attestation verify --owner B2JK-Industry`
#
# Verification by an external party (no GH CLI required):
#   cosign verify-blob \
#     --certificate-identity-regexp \
#       "^https://github.com/B2JK-Industry/SBO3L-ethglobal-openagents-2026/.github/workflows/crates-publish.yml@refs/tags/v[0-9].*" \
#     --certificate-oidc-issuer \
#       "https://token.actions.githubusercontent.com" \
#     --bundle <attestation-bundle.json> \
#     <crate-file.crate>
#
# Full operator-side guide: docs/security/supply-chain.md
#
# Required secret: `CARGO_REGISTRY_TOKEN` (Daniel provisions in
# repo Settings → Secrets and variables → Actions).

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  id-token: write
  attestations: write
  contents: read

jobs:
  publish:
    name: Publish all 9 crates in dep order
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust
        run: rustup update stable && rustup default stable

      - name: Verify the tag matches the workspace version
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"
          tag="${tag#v}"
          ws_version=$(grep -E '^version = ' Cargo.toml | head -1 | cut -d'"' -f2)
          if [ "$tag" != "$ws_version" ]; then
            echo "::error::tag $tag does not match workspace.package.version $ws_version"
            exit 1
          fi
          echo "VERSION=$tag" >> "$GITHUB_ENV"
          echo "publishing v$tag"

      - name: cargo package — sbo3l-core
        run: cargo package -p sbo3l-core --allow-dirty
      - name: attest provenance — sbo3l-core
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: target/package/sbo3l-core-${{ env.VERSION }}.crate
      - name: cargo publish — sbo3l-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p sbo3l-core --no-verify
      - name: wait for crates.io index propagation (sbo3l-core)
        run: sleep 30

      - name: cargo package — sbo3l-storage
        run: cargo package -p sbo3l-storage --allow-dirty
      - name: attest provenance — sbo3l-storage
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: target/package/sbo3l-storage-${{ env.VERSION }}.crate
      - name: cargo publish — sbo3l-storage
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p sbo3l-storage --no-verify
      - name: wait for crates.io index propagation (sbo3l-storage)
        run: sleep 30

      - name: cargo package — sbo3l-policy
        run: cargo package -p sbo3l-policy --allow-dirty
      - name: attest provenance — sbo3l-policy
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: target/package/sbo3l-policy-${{ env.VERSION }}.crate
      - name: cargo publish — sbo3l-policy
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p sbo3l-policy --no-verify
      - name: wait for crates.io index propagation (sbo3l-policy)
        run: sleep 30

      - name: cargo package — sbo3l-identity
        run: cargo package -p sbo3l-identity --allow-dirty
      - name: attest provenance — sbo3l-identity
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: target/package/sbo3l-identity-${{ env.VERSION }}.crate
      - name: cargo publish — sbo3l-identity
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p sbo3l-identity --no-verify
      - name: wait for crates.io index propagation (sbo3l-identity)
        run: sleep 30

      - name: cargo package — sbo3l-keeperhub-adapter
        run: cargo package -p sbo3l-keeperhub-adapter --allow-dirty
      - name: attest provenance — sbo3l-keeperhub-adapter
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: target/package/sbo3l-keeperhub-adapter-${{ env.VERSION }}.crate
      - name: cargo publish — sbo3l-keeperhub-adapter
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p sbo3l-keeperhub-adapter --no-verify
      - name: wait for crates.io index propagation (sbo3l-keeperhub-adapter)
        run: sleep 30

      - name: cargo package — sbo3l-execution
        run: cargo package -p sbo3l-execution --allow-dirty
      - name: attest provenance — sbo3l-execution
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: target/package/sbo3l-execution-${{ env.VERSION }}.crate
      - name: cargo publish — sbo3l-execution
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p sbo3l-execution --no-verify
      - name: wait for crates.io index propagation (sbo3l-execution)
        run: sleep 30

      - name: cargo package — sbo3l-server
        run: cargo package -p sbo3l-server --allow-dirty
      - name: attest provenance — sbo3l-server
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: target/package/sbo3l-server-${{ env.VERSION }}.crate
      - name: cargo publish — sbo3l-server
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p sbo3l-server --no-verify
      - name: wait for crates.io index propagation (sbo3l-server)
        run: sleep 30

      - name: cargo package — sbo3l-mcp
        run: cargo package -p sbo3l-mcp --allow-dirty
      - name: attest provenance — sbo3l-mcp
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: target/package/sbo3l-mcp-${{ env.VERSION }}.crate
      - name: cargo publish — sbo3l-mcp
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p sbo3l-mcp --no-verify
      - name: wait for crates.io index propagation (sbo3l-mcp)
        run: sleep 30

      - name: cargo package — sbo3l-cli
        run: cargo package -p sbo3l-cli --allow-dirty
      - name: attest provenance — sbo3l-cli
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: target/package/sbo3l-cli-${{ env.VERSION }}.crate
      - name: cargo publish — sbo3l-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p sbo3l-cli --no-verify

      - name: Upload all 9 .crate files + attestation bundles
        uses: actions/upload-artifact@v4
        with:
          name: sbo3l-crates-${{ env.VERSION }}-attested
          path: target/package/*.crate
          retention-days: 90
