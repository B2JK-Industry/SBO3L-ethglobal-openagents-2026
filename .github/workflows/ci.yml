name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  rust:
    name: Rust ${{ matrix.profile }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [check]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace --all-targets

  schemas:
    name: Validate JSON schemas / OpenAPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validator
        run: pip install "jsonschema[format]>=4.21" "openapi-spec-validator>=0.7"

      - name: Validate JSON Schemas
        run: |
          set -e
          for f in schemas/*.json; do
            echo "[meta] $f"
            python -c "import json,jsonschema,sys; s=json.load(open('$f')); jsonschema.Draft202012Validator.check_schema(s); print('  ok')"
          done

      - name: Validate OpenAPI
        run: |
          python -c "import json; from openapi_spec_validator import validate_spec; validate_spec(json.load(open('docs/api/openapi.json'))); print('openapi ok')"

      - name: Validate test corpus against schemas
        run: |
          python - <<'PY'
          import json, jsonschema, sys, pathlib
          aprp = json.load(open('schemas/aprp_v1.json'))
          policy = json.load(open('schemas/policy_v1.json'))
          fixtures = [
              ('aprp', 'test-corpus/aprp/golden_001_minimal.json', True),
              ('aprp', 'test-corpus/aprp/deny_prompt_injection_request.json', True),
              ('aprp', 'test-corpus/aprp/adversarial_unknown_field.json', False),
              ('policy', 'test-corpus/policy/reference_low_risk.json', True),
          ]
          schemas = {'aprp': aprp, 'policy': policy}
          ok = True
          for kind, path, should_pass in fixtures:
              data = json.load(open(path))
              try:
                  jsonschema.Draft202012Validator(schemas[kind]).validate(data)
                  passed = True
              except jsonschema.ValidationError:
                  passed = False
              status = 'ok' if passed == should_pass else 'FAIL'
              print(f"{status}: {path} expect_valid={should_pass} actual={passed}")
              if passed != should_pass:
                  ok = False
          sys.exit(0 if ok else 1)
          PY
