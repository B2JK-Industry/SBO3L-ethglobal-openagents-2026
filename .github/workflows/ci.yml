name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    name: Rust ${{ matrix.profile }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [check]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace --all-targets

  schemas:
    name: Validate JSON schemas / OpenAPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validators
        run: pip install "jsonschema[format]>=4.21" "openapi-spec-validator>=0.7" "referencing>=0.35"

      - name: Validate JSON schemas and test corpus
        run: python scripts/validate_schemas.py

      - name: Validate OpenAPI
        run: python scripts/validate_openapi.py

      - name: Trust-badge render regression test
        run: python trust-badge/test_build.py

      - name: Demo-fixtures URL allowlist + mock-fixture regression test
        run: python demo-fixtures/test_fixtures.py

      - name: Operator-console render regression test
        run: |
          python operator-console/build.py \
            --input operator-console/fixtures/operator-summary.json \
            --evidence operator-console/fixtures/operator-evidence.json
          python operator-console/test_build.py

  wasm-verifier-build:
    name: WASM verifier build (#110 marketing /proof)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (with wasm32 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM verifier
        run: bash scripts/build-wasm-verifier.sh

      - name: Assert artefacts exist
        run: |
          set -euo pipefail
          for f in sbo3l_core.js sbo3l_core_bg.wasm sbo3l_core.d.ts package.json; do
            if [ ! -f "apps/marketing/public/wasm/$f" ]; then
              echo "::error::missing apps/marketing/public/wasm/$f"
              exit 1
            fi
          done
          wasm_size=$(wc -c <apps/marketing/public/wasm/sbo3l_core_bg.wasm | tr -d ' ')
          echo "WASM size: $wasm_size bytes"
          # Sanity bound — the unstripped build is ~2.3 MiB; gate at 5 MiB
          # to catch a bloat regression without churning every PR.
          if [ "$wasm_size" -gt 5242880 ]; then
            echo "::error::WASM size $wasm_size > 5 MiB; investigate"
            exit 1
          fi
