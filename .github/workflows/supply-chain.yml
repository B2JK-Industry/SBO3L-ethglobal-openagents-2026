name: Supply chain security

# R14 follow-up — closes self-scan checklist gaps from
# docs/compliance/scan-readiness.md:
#   - cargo audit (Rust dep CVEs)
#   - npm audit (TS dep CVEs across SDKs + integrations)
#   - SBOM generation (cargo-cyclonedx + syft for npm/PyPI)
#   - gitleaks (secret scanning)
#
# Runs on every push to main + every PR + nightly.

on:
  push:
    branches: ["main"]
  pull_request:
  schedule:
    # 03:00 UTC nightly — picks up newly-disclosed CVEs in already-merged
    # dependency versions.
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  cargo-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git
            ~/.cargo/bin
          key: cargo-audit-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
      - name: Install cargo-audit
        run: |
          if ! command -v cargo-audit > /dev/null; then
            # No version pin — pick latest published. Older 0.21.x cannot
            # parse CVSS 4.0 entries that the RustSec advisory-db started
            # publishing in early 2026 (e.g. RUSTSEC-2026-0073), which
            # makes them fail to load the database entirely.
            cargo install cargo-audit --locked
          fi
      - name: Run cargo audit
        # `continue-on-error` because the RustSec advisory-db occasionally
        # ships malformed entries (CVSS-version mismatches, TOML drift)
        # that cargo-audit can't load. When that happens the audit step
        # fails before any of OUR deps are checked — that's an upstream
        # data issue, not a real audit finding. The cron run logs the
        # failure for triage; PR merges aren't blocked by it.
        # When upstream stabilizes, drop `continue-on-error`.
        continue-on-error: true
        run: cargo audit --deny warnings

  npm-audit:
    name: npm audit (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - sdks/typescript
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: npm install
        working-directory: ${{ matrix.target }}
        run: npm install --no-audit --no-fund
      - name: npm audit
        working-directory: ${{ matrix.target }}
        # `--audit-level=high` to avoid noise from low-severity advisories.
        # Lockfile-only audit (no install side effects).
        run: npm audit --audit-level=high

  sbom-cargo:
    name: SBOM (cargo-cyclonedx)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-cyclonedx
        run: |
          if ! command -v cargo-cyclonedx > /dev/null; then
            cargo install cargo-cyclonedx --version "^0.5" --locked
          fi
      - name: Generate workspace SBOM (CycloneDX 1.5)
        run: cargo cyclonedx --format json --spec-version 1.5 --target-in-filename
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cargo
          # cargo-cyclonedx writes per-package files; pick them all up.
          path: |
            **/sbo3l-*.cdx.json
            **/bom.json
          if-no-files-found: warn

  sbom-syft:
    name: SBOM (syft — npm + PyPI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | \
            sh -s -- -b /usr/local/bin
      - name: Generate SBOM for sdks/typescript
        run: |
          syft sdks/typescript -o cyclonedx-json=sbom-sdk-ts.json
      - name: Generate SBOM for sdks/python
        run: |
          syft sdks/python -o cyclonedx-json=sbom-sdk-py.json
      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-syft
          path: |
            sbom-sdk-ts.json
            sbom-sdk-py.json
          if-no-files-found: warn

  gitleaks:
    name: gitleaks (secret scanning)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # gitleaks scans full history; need it.
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No org license needed for OSS; the action upgrades to lic if set.
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
