name: SDK Python

on:
  push:
    branches: ["**"]
    tags: ["sdk-py-v*"]
    paths:
      - "sdks/python/**"
      - ".github/workflows/sdk-python.yml"
  pull_request:
    paths:
      - "sdks/python/**"
      - ".github/workflows/sdk-python.yml"

permissions:
  contents: read
  id-token: write

jobs:
  build-test:
    name: build + test (py${{ matrix.python }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/python
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: sdks/python/pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy --strict
        run: mypy --strict sbo3l_sdk

      - name: Pytest
        run: pytest -q

      - name: Build wheel + sdist
        run: |
          python -m pip install build
          python -m build

  publish:
    name: publish to PyPI
    runs-on: ubuntu-latest
    needs: build-test
    if: startsWith(github.ref, 'refs/tags/sdk-py-v')
    defaults:
      run:
        working-directory: sdks/python
    environment:
      name: pypi
      url: https://pypi.org/p/sbo3l-sdk
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: python -m pip install --upgrade pip build

      - name: Verify tag version matches pyproject.toml
        run: |
          PKG_VERSION=$(python -c "import tomllib,sys; print(tomllib.loads(open('pyproject.toml','rb').read().decode())['project']['version'])")
          TAG_VERSION="${GITHUB_REF_NAME#sdk-py-v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::tag $TAG_VERSION != pyproject.toml $PKG_VERSION"
            exit 1
          fi

      - name: Build
        run: python -m build

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdks/python/dist
