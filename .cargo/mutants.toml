# cargo-mutants config (R13 P2).
#
# Drives weekly mutation testing on sbo3l-core, sbo3l-policy, sbo3l-identity.
# Goal: 90%+ mutation kill rate across these three crates. Alive
# mutations file GitHub issues for triage.
#
# Local run:
#   cargo install cargo-mutants
#   cargo mutants --package sbo3l-core
#
# Reference: https://mutants.rs/configuration.html
#
# Note: package selection is done via CLI `--package <name>` (the
# workflow matrix at .github/workflows/mutation-testing.yml drives this).
# cargo-mutants has no `test_package` config field — the workflow file is
# the source of truth for which packages get mutated.

# Skip files that are generated, vendored, or otherwise not target code.
exclude_globs = [
    "**/build.rs",
    "**/wasm.rs",
    "**/wasm_types.rs",
    "**/mock_kms.rs",
    "**/tests/**",
    "**/benches/**",
]

# Skip individual functions that mutation testing struggles with.
exclude_re = [
    # WASM glue functions are exercised through wasm-pack tests, not unit tests.
    "^wasm_.*",
]

# Per-mutant timeout floor in seconds. cargo-mutants computes a baseline
# from the unmutated build/test runtime and multiplies by `timeout_multiplier`;
# this clamps the floor for fast suites where the multiplier alone would
# produce sub-second timeouts that flake on shared CI runners.
minimum_test_timeout = 180

# Multiplier on the baseline test runtime per mutant.
timeout_multiplier = 5.0

# Run cargo build/test with `--release` to match production execution
# semantics (avoids debug-only `assert!` paths inflating kill rate).
additional_cargo_args = ["--release"]

# Use `cargo` test runner. Other valid value: "nextest".
test_tool = "cargo"
