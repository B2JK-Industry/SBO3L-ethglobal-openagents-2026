[build-system]
requires = ["hatchling>=1.21"]
build-backend = "hatchling.build"

[project]
name = "sbo3l-sdk"
version = "0.1.0"
description = "Official Python SDK for SBO3L — the cryptographically verifiable trust layer for autonomous AI agents."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [
    { name = "Daniel Babjak", email = "babjak_daniel@hotmail.com" },
]
keywords = [
    "sbo3l",
    "agent",
    "policy",
    "audit",
    "ed25519",
    "passport",
    "trust",
    "ai-agent",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Security :: Cryptography",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
dependencies = [
    "httpx>=0.27,<1",
    "pydantic>=2.6,<3",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0,<9",
    "pytest-asyncio>=0.23,<1",
    "pytest-httpx>=0.30,<1",
    "hypothesis>=6.100,<7",
    "ruff>=0.4,<1",
    "mypy>=1.10,<2",
    "build>=1.2,<2",
]

[project.urls]
Homepage = "https://sbo3l.dev"
Repository = "https://github.com/B2JK-Industry/SBO3L-ethglobal-openagents-2026"
Issues = "https://github.com/B2JK-Industry/SBO3L-ethglobal-openagents-2026/issues"

[tool.hatch.build.targets.wheel]
packages = ["sbo3l_sdk"]

[tool.hatch.build.targets.sdist]
include = [
    "/sbo3l_sdk",
    "/tests",
    "/README.md",
    "/pyproject.toml",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
filterwarnings = [
    "error",
]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "W", "UP", "N", "C90", "ASYNC", "S", "RUF"]
ignore = [
    # Allow assert in tests; ruff's S101 fires per-file in lint config below.
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101", "S105", "S106", "S311"]
# Preserve semantic ordering of __all__ (grouped by clients/errors/passport/auth/types).
"sbo3l_sdk/__init__.py" = ["RUF022"]

[tool.mypy]
python_version = "3.10"
strict = true
warn_unused_ignores = true
warn_redundant_casts = true
warn_return_any = true
disallow_untyped_decorators = true
no_implicit_optional = true
plugins = ["pydantic.mypy"]

[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_decorators = false

[tool.pydantic-mypy]
init_forbid_extra = true
init_typed = true
warn_required_dynamic_aliases = true
