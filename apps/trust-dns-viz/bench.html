<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Trust DNS — bench harness</title>
    <link rel="stylesheet" href="/src/style.css" />
    <style>
      #fps {
        position: fixed;
        top: 8px;
        right: 12px;
        font-family: var(--font-mono);
        font-size: 0.8em;
        background: var(--code-bg);
        padding: 0.4em 0.7em;
        border-radius: var(--r-sm);
        color: var(--fg);
      }
    </style>
  </head>
  <body>
    <header id="chrome">
      <a class="brand" href="/">SBO3L · Trust DNS · Bench</a>
      <span id="status" class="connected"></span>
    </header>
    <main>
      <svg id="viz" role="img" aria-label="Bench harness force-directed graph"></svg>
      <canvas id="viz-canvas" role="img" aria-label="Bench harness force-directed graph (canvas)"></canvas>
      <div id="fps" aria-live="polite">— fps</div>
    </main>
    <script type="module">
      import { mountGraph } from "/src/graph.ts";
      import { mountCanvasGraph } from "/src/canvas-renderer.ts";

      // Bench params: ?nodes=N (default 100), ?renderer=svg|canvas
      // (default canvas above 100, svg otherwise), ?rate=ms-between-events
      // (default 20).
      const params = new URLSearchParams(location.search);
      const N = Math.max(1, Math.min(2000, Number.parseInt(params.get("nodes") ?? "100", 10)));
      const rate = Math.max(5, Number.parseInt(params.get("rate") ?? "20", 10));
      const explicit = params.get("renderer");
      const useCanvas = explicit === "canvas" || (explicit !== "svg" && N > 100);

      const svg = document.getElementById("viz");
      const canvas = document.getElementById("viz-canvas");
      const status = document.getElementById("status");
      const fpsEl = document.getElementById("fps");

      svg.style.display = useCanvas ? "none" : "block";
      canvas.style.display = useCanvas ? "block" : "none";
      status.textContent = `${N}-agent stress · ${useCanvas ? "canvas" : "svg"} · ${rate}ms`;

      const graph = useCanvas ? mountCanvasGraph(canvas) : mountGraph(svg);

      // Seed N agents.
      for (let i = 0; i < N; i += 1) {
        graph.apply({
          kind: "agent.discovered",
          agent_id: `bench-${i.toString().padStart(4, "0")}`,
          ens_name: `bench-${i}.sbo3lagent.eth`,
          pubkey_b58: `mock-pubkey-bench-${i}`,
          ts_ms: Date.now(),
        });
      }

      let lastFrame = performance.now();
      let frames = 0;
      let acc = 0;
      const tick = (now) => {
        frames += 1;
        acc += now - lastFrame;
        lastFrame = now;
        if (acc >= 500) {
          fpsEl.textContent = `${Math.round((frames * 1000) / acc)} fps · n=${N}`;
          frames = 0;
          acc = 0;
        }
        requestAnimationFrame(tick);
      };
      requestAnimationFrame(tick);

      setInterval(() => {
        const i = Math.floor(Math.random() * N);
        const j = Math.floor(Math.random() * N);
        const which = Math.floor(Math.random() * 3);
        const id = `bench-${i.toString().padStart(4, "0")}`;
        const id2 = `bench-${j.toString().padStart(4, "0")}`;
        const now = Date.now();
        if (which === 0) {
          graph.apply({ kind: "attestation.signed", from: id, to: id2, attestation_id: `att-${now}`, ts_ms: now });
        } else if (which === 1) {
          graph.apply({ kind: "decision.made", agent_id: id, decision: "allow", ts_ms: now });
        } else {
          graph.apply({ kind: "decision.made", agent_id: id, decision: "deny", deny_code: "policy.deny_unknown_provider", ts_ms: now });
        }
      }, rate);
    </script>
  </body>
</html>
