[package]
name = "sbo3l-core"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
readme.workspace = true
description = "SBO3L core: protocol types, request hashing, error model, signed receipts."
keywords = ["sbo3l", "ed25519", "audit", "policy", "agent"]
categories = ["cryptography", "data-structures"]

[lib]
# wasm-pack consumes the cdylib output for the #110 marketing-site
# verifier; the rlib is kept so workspace consumers (sbo3l-policy,
# sbo3l-server, sbo3l-cli, etc.) link unchanged. Native builds never
# produce the cdylib.
crate-type = ["cdylib", "rlib"]

# wasm-pack bundled wasm-opt rejects rustc's bulk-memory ops; disable
# the post-processing step. Size hit ~10-20% (acceptable hackathon-scope).
[package.metadata.wasm-pack.profile.release]
wasm-opt = false

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
serde_json_canonicalizer = { workspace = true }
thiserror = { workspace = true }
sha2 = { workspace = true }
ed25519-dalek = { workspace = true }
hex = { workspace = true }
rand = { workspace = true }
chrono = { workspace = true }
rust_decimal = { workspace = true }
ulid = { workspace = true }
jsonschema = { workspace = true }

# wasm32 verifier slice (`scripts/build-wasm-verifier.sh`): pin
# `getrandom = { version = "0.3", features = ["wasm_js"] }` for the
# wasm target so OsRng has a JS-side entropy source. Native targets
# don't need it (the default backend is /dev/urandom on Unix and
# BCryptGenRandom on Windows). Per `rand`'s wasm32 docs.
[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom = { version = "0.3", features = ["wasm_js"] }
# wasm-pack JS bridge for the #110 marketing-site verifier. Keeping
# wasm-bindgen as a wasm-only dep means native sbo3l-core builds
# don't pull a JS-binding crate they never use.
wasm-bindgen = "0.2"
serde-wasm-bindgen = "0.6"

# F-5: KMS backends are feature-gated. Each feature compiles a stub
# module today; the actual SDK dependency is pulled in by a follow-up
# nightly task once Daniel provisions a test key. Until then, daemon
# builds with `--features aws_kms` (etc.) compile cleanly without
# multi-MB SDK dependency trees, and the factory routes to a backend
# whose `sign_hex` returns "not yet implemented".
[features]
default = []
aws_kms = []
gcp_kms = []
phala_tee = []
eth_signer = []
